<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defender Bank</title>
    <!-- Подключаем легкую библиотеку для QR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #050505; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .container { width: 100%; max-width: 450px; padding: 20px; }
        
        .auth-screen { text-align: center; }
        .logo { font-size: 40px; font-weight: bold; color: #00e676; margin-bottom: 30px; letter-spacing: 2px; }
        .input-field { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 18px; margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: #00e676; color: #000; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #00c853; transform: scale(1.02); }

        .dashboard { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .balance-card { background: linear-gradient(135deg, #1e1e1e, #2a2a2a); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 25px; border: 1px solid #333; }
        .balance-label { color: #888; font-size: 14px; text-transform: uppercase; }
        .balance-amount { font-size: 42px; font-weight: bold; color: #fff; margin: 10px 0; }
        
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .action-btn { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .action-btn:hover { border-color: #00e676; background: #222; }
        .action-icon { font-size: 24px; margin-bottom: 10px; display: block; }
        
        .history-list { background: #1a1a1a; border-radius: 15px; padding: 20px; max-height: 300px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; }
        .history-item:last-child { border-bottom: none; }
        .h-info h4 { font-size: 16px; margin-bottom: 4px; }
        .h-info span { font-size: 12px; color: #666; }
        .h-amount { font-weight: bold; }
        .h-amount.plus { color: #00e676; }
        .h-amount.minus { color: #ff5252; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #666; }
        
        #video-container { position: relative; width: 100%; height: 250px; background: #000; margin-bottom: 15px; border-radius: 10px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #scan-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid #00e676; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        
        .sim-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px; width: 100%; margin-top: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .sim-btn:hover { background: #444; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Вход -->
        <div class="auth-screen" id="authScreen">
            <div class="logo">DEFENDER BANK</div>
            <input type="password" id="passwordInput" class="input-field" placeholder="Введите пароль">
            <button class="btn-main" onclick="login()">Войти / Регистрация</button>
            <p style="margin-top: 15px; color: #666; font-size: 12px;">При первом входе будет создан новый счет (5000 ₽)</p>
        </div>

        <!-- Дашборд -->
        <div class="dashboard" id="dashboard">
            <div class="balance-card">
                <div class="balance-label">Ваш баланс</div>
                <div class="balance-amount" id="balanceDisplay">0 ₽</div>
            </div>

            <div class="actions-grid">
                <div class="action-btn" onclick="openTransferModal()">
                    <span class="action-icon">💸</span>
                    Перевод
                </div>
                <div class="action-btn" onclick="openScanner()">
                    <span class="action-icon">📷</span>
                    Сканировать QR
                </div>
            </div>

            <h3 style="margin-bottom: 15px; color: #888;">История операций</h3>
            <div class="history-list" id="historyList"></div>
            
            <button class="btn-main" style="background: #333; color: #fff; margin-top: 20px;" onclick="logout()">Выйти</button>
        </div>
    </div>

    <!-- Модалка перевода -->
    <div class="modal" id="transferModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModals()">&times;</span>
            <h2 style="margin-bottom: 20px;">Перевод денег</h2>
            <input type="text" id="transferTo" class="input-field" placeholder="ID получателя">
            <input type="number" id="transferAmount" class="input-field" placeholder="Сумма">
            <button class="btn-main" onclick="makeTransfer()">Отправить</button>
        </div>
    </div>

    <!-- Модалка сканера -->
    <div class="modal" id="scannerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModals()">&times;</span>
            <h2 style="margin-bottom: 15px;">Сканирование QR</h2>
            
            <div id="video-container">
                <video id="video" playsinline></video>
                <div id="scan-overlay"></div>
                <div id="camera-error" style="display:none; color: #ff5252; padding: 20px;">Камера недоступна</div>
            </div>
            
            <p style="color: #888; font-size: 14px; margin-bottom: 10px;">Наведите на QR-код из Defender 4</p>
            
            <!-- Кнопка симуляции для тестов без камеры -->
            <button class="sim-btn" onclick="simulateScan()">🛠 Симулировать сканирование (Тест)</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let video = document.getElementById('video');
        let canvasElement = document.createElement('canvas');
        let canvas = canvasElement.getContext('2d');
        let scanning = false;

        function getUsersDB() { return JSON.parse(localStorage.getItem('defender_bank_users')) || {}; }
        function saveUsersDB(db) { localStorage.setItem('defender_bank_users', JSON.stringify(db)); }

        function login() {
            const pass = document.getElementById('passwordInput').value;
            if (!pass) return alert('Введите пароль');
            const db = getUsersDB();
            if (!db[pass]) {
                db[pass] = { balance: 5000, history: [] };
                saveUsersDB(db);
                alert('Аккаунт создан! Баланс: 5000 ₽');
            }
            currentUser = pass;
            updateUI();
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function logout() { location.reload(); }

        function updateUI() {
            const db = getUsersDB();
            const user = db[currentUser];
            document.getElementById('balanceDisplay').textContent = user.balance.toLocaleString() + ' ₽';
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            user.history.slice().reverse().slice(0, 10).forEach(op => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const isPlus = op.type === 'income';
                div.innerHTML = `
                    <div class="h-info"><h4>${op.title}</h4><span>${new Date(op.date).toLocaleTimeString()}</span></div>
                    <div class="h-amount ${isPlus ? 'plus' : 'minus'}">${isPlus ? '+' : '-'}${op.amount} ₽</div>
                `;
                list.appendChild(div);
            });
        }

        function addHistory(title, amount, type) {
            const db = getUsersDB();
            db[currentUser].history.push({ title, amount, type, date: new Date().toISOString() });
            saveUsersDB(db);
            updateUI();
        }

        function openTransferModal() { document.getElementById('transferModal').style.display = 'flex'; }
        
        function makeTransfer() {
            const to = document.getElementById('transferTo').value;
            const amount = parseInt(document.getElementById('transferAmount').value);
            const db = getUsersDB();
            if (!db[to]) return alert('Получатель не найден');
            if (db[currentUser].balance < amount) return alert('Недостаточно средств');
            if (to === currentUser) return alert('Нельзя себе');

            db[currentUser].balance -= amount;
            db[to].balance += amount;
            addHistory(`Перевод пользователю ${to}`, amount, 'expense');
            db[to].history.push({ title: `Перевод от ${currentUser}`, amount, type: 'income', date: new Date().toISOString() });
            saveUsersDB(db);
            updateUI();
            closeModals();
            alert('Перевод успешен!');
        }

        // --- ЛОГИКА СКАНЕРА ---
        function openScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(tick);
                scanning = true;
                document.getElementById('camera-error').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('camera-error').style.display = 'block';
                document.getElementById('camera-error').innerText = "Ошибка камеры. Используйте кнопку симуляции.";
            }
        }

        function tick() {
            if (!scanning) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
                
                if (code) {
                    processQR(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        // Функция обработки данных QR
        function processQR(data) {
            try {
                const parsed = JSON.parse(data);
                if (parsed.type === 'taxi_payment') {
                    stopCamera();
                    closeModals();
                    
                    const amount = Math.floor(parsed.amount); // Округляем
                    const db = getUsersDB();
                    
                    if (db[currentUser].balance >= amount) {
                        db[currentUser].balance -= amount;
                        addHistory(`Оплата поездки (Defender 4)`, amount, 'expense');
                        saveUsersDB(db);
                        updateUI();
                        alert(`Успешно оплачено: ${amount} ₽`);
                        // Очищаем QR чтобы не оплатить дважды
                        localStorage.removeItem('defender4_qr_data'); 
                    } else {
                        alert('Недостаточно средств на карте банка!');
                    }
                }
            } catch (e) { console.log('Неверный формат QR'); }
        }

        // СИМУЛЯЦИЯ (Если камера не работает)
        function simulateScan() {
            // Берем данные прямо из памяти, как будто отсканировали
            const qrData = localStorage.getItem('defender4_qr_data'); // Или просто читаем статус
            // Но так как Defender 4 пишет статус, а QR генерирует динамически,
            // мы эмулируем успешное считывание последнего сгенерированного кода
            
            // Для теста создадим фейковый объект, как будто отсканировали
            // В реальности Defender 4 должен сохранять сумму в localStorage при генерации QR
            const lastAmount = prompt("Введите сумму для теста (как будто отсканировали):", "100");
            if(lastAmount) {
                processQR(JSON.stringify({ type: 'taxi_payment', amount: parseInt(lastAmount) }));
            }
        }

        function stopCamera() {
            scanning = false;
            let stream = video.srcObject;
            if (stream) {
                let tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            stopCamera();
        }
    </script>
</body>
</html>
